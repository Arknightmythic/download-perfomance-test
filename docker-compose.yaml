version: '3.8'

services:
  # 1. Aplikasi Laravel (PHP-FPM)
  app:
    build: .
    restart: unless-stopped
    volumes:
      - .:/var/www
    deploy:
      resources:
        limits:
          cpus: '0.6'       # Maksimal pakai 60% dari 1 Core CPU
          memory: 512M      # RAM Maksimal 512MB
    networks:
      - perf_net

  # 2. Queue Worker (Memproses file CSV di background)
  # 2. Queue Worker (Memproses file CSV di background)
  worker:
    build: .
    restart: unless-stopped
    command: php -d memory_limit=-1 artisan queue:work redis --sleep=3 --tries=1 --timeout=7200
    volumes:
      - .:/var/www
    deploy:
      resources:
        limits:
          cpus: '1.0'       # <--- NAIKKAN MENJADI 1.0 (1 Core Penuh)
          memory: 2048M     
    depends_on:
      - redis
      - db
    networks:
      - perf_net

  # 3. Web Server (Nginx)
  web:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "8002:80"
    volumes:
      - .:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    depends_on:
      - app
    networks:
      - perf_net

  # 4. Database PostgreSQL
  db:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: dwnld_perfom_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password_rahasia # Isi sesuai keinginan
    volumes:
      - db_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
    networks:
      - perf_net

  # 5. Redis (Untuk Queue)
  redis:
    image: redis:alpine
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.2'
          memory: 128M
    networks:
      - perf_net

networks:
  perf_net:
    driver: bridge

volumes:
  db_data: